spring:
  application:
    name: AiCodeReview

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}           # Set this in Railway env vars
      chat:
        options:
          model: gpt-4o                     # Change to gpt-3.5-turbo to save cost
          temperature: 0.7                  # Low temp = consistent review output
          max-tokens: 3000

  server:
    port: ${PORT:8080}                        # Railway injects PORT automatically

  # CORS — update FRONTEND_URL in Railway env vars after Vercel deploy
  app:
    cors:
      allowed-origins: ${FRONTEND_URL:http://localhost:3000,http://127.0.0.1:5500}

  # Actuator for Railway health checks
  management:
    endpoints:
      web:
        exposure:
          include: health,info
    endpoint:
      health:
        show-details: always

  # Logging
  logging:
    level:
      com.codereview: DEBUG
      org.springframework.ai: INFO
      org.springframework.web: INFO
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
      file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file:
      name: logs/code-review.log
      max-size: 10MB
      max-history: 7